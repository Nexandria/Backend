services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://prisma:prisma123@postgres:5432/appdb?schema=public
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

volumes:
  postgres_data:
  backend_node_modules: